name: trust_flow
description: "A new Flutter project."

publish_to: 'none'
version: 1.1.0+2

environment:
  sdk: ^3.8.1

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_bloc: ^8.1.3
  hydrated_bloc: ^9.1.5 
  equatable: ^2.0.5
  dartz: ^0.10.1
  dio: ^5.4.0

  # Service Locator
  get_it: ^7.6.4

  # Local Storage/ Secure Storage
  shared_preferences: ^2.2.2
  flutter_secure_storage: ^9.0.0

  # Payment Gateway
  flutter_paystack_plus: ^2.5.0
  intl: ^0.19.0

  # UI & Fonts
  google_fonts: ^6.1.0 

  # Camera & ML
  image_picker: ^1.0.4
  path_provider: ^2.1.1
  camera: ^0.10.5+5
  google_mlkit_face_detection: ^0.10.0
  flutter_image_compress: ^2.1.0

  #Authentication(Biometrics)
  local_auth: ^2.3.0

  # Security / Encryption
  crypto: ^3.0.3

  # Permissions
  permission_handler: ^12.0.1

  # Environment Variables
  flutter_dotenv: ^5.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.4



flutter:
  uses-material-design: true
  assets:
    - assets/
    - .env

  # Flutter Launcher Icons configuration
flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/images/trustflowlogo.png"
